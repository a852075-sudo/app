<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="放射盤點">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>放射科對比劑智慧盤點系統</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/mobile.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="top-app-bar">
        <button id="backBtn" class="icon-btn is-hidden" type="button" aria-label="返回首頁">
          <span class="material-symbols-rounded">arrow_back</span>
        </button>
        <div class="title-block">
          <h1 id="appTitle">放射科對比劑智慧盤點</h1>
          <p id="appSubtitle">智慧試算、Google Sheets 同步與離線盤點</p>
        </div>
        <button id="syncBtn" class="icon-btn" type="button" aria-label="同步">
          <span class="material-symbols-rounded">sync</span>
        </button>
        <button id="settingsBtn" class="icon-btn" type="button" aria-label="設定">
          <span class="material-symbols-rounded">settings</span>
        </button>
      </header>

      <main id="viewRoot" class="view-root" tabindex="-1"></main>

      <button id="installBtn" class="install-fab is-hidden" type="button">
        <span class="material-symbols-rounded">install_mobile</span>
        安裝
      </button>
    </div>

    <dialog id="entryDialog" class="app-dialog">
      <form id="entryForm" method="dialog">
        <div class="dialog-head">
          <h2 id="entryDialogTitle">新增盤點</h2>
          <button class="icon-btn" value="cancel" type="button" data-close-dialog aria-label="關閉">
            <span class="material-symbols-rounded">close</span>
          </button>
        </div>
        <div class="form-grid">
          <label>日期 <input id="entryDate" name="date" type="date" required></label>
          <label>品項 <input id="entryItem" name="item" list="itemList" placeholder="Omnipaque" required></label>
          <datalist id="itemList"></datalist>
          <label>入庫 <input id="entryIn" name="inQty" type="number" min="0" step="1" value="0"></label>
          <label>使用 <input id="entryUsed" name="usedQty" type="number" min="0" step="1" value="0"></label>
          <label>報廢 <input id="entryWaste" name="wasteQty" type="number" min="0" step="1" value="0"></label>
          <label class="span-2">備註 <textarea id="entryNote" name="note" rows="3" placeholder="交班、盤差、補充說明"></textarea></label>
        </div>
        <div class="dialog-actions">
          <button class="text-btn" value="cancel" type="button" data-close-dialog>取消</button>
          <button class="filled-btn" value="default" type="submit">儲存</button>
        </div>
      </form>
    </dialog>

    <dialog id="settingsDialog" class="app-dialog wide-dialog">
      <form id="settingsForm" method="dialog">
        <div class="dialog-head">
          <h2>設定</h2>
          <button class="icon-btn" value="cancel" type="button" data-close-dialog aria-label="關閉">
            <span class="material-symbols-rounded">close</span>
          </button>
        </div>
        <section class="settings-section">
          <h3>Google Apps Script API</h3>
          <label>API 網址 <input id="apiUrlInput" name="apiUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec"></label>
          <p class="helper">未設定時會保存在本機；設定後讀取、新增、修改與覆蓋會同步到 Google Sheets。</p>
        </section>
        <section class="settings-section">
          <h3>月初期初庫存</h3>
          <div id="initialStockInputs" class="settings-list"></div>
        </section>
        <section class="settings-section">
          <h3>Sheet 對照</h3>
          <div id="sheetMapInputs" class="settings-list"></div>
        </section>
        <div class="dialog-actions">
          <button class="text-btn" value="cancel" type="button" data-close-dialog>取消</button>
          <button class="filled-btn" value="default" type="submit">儲存設定</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
